<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monalisa - Olhos Seguem o Mouse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎨 Monalisa Interativa</h1>
        <p class="subtitle">Mova o mouse e veja os olhos da Monalisa seguirem você!</p>
        
        <canvas id="monalisaCanvas" width="600" height="700"></canvas>
        
        <div class="info">
            <p>Posição do Mouse: <span id="mousePos">X: 0, Y: 0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
